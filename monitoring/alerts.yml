# SLO 기반 알림 규칙 (#14 / D7b). 지금은 Prometheus 가 평가만 한다(ALERTS 시계열/그래프로 확인) —
# Alertmanager 로 실제 통지 라우팅하는 건 #15(프로덕션 인프라) 후속. 지표는 #68 로 이미 노출된
# http_server_requests(가용성·지연)와 hikaricp(DB 풀), reputation.*(도메인)에서 뽑는다.
groups:
  - name: reputation-pool-slo
    rules:
      # 가용성 SLO: 5xx 비율이 5% 를 5분 이상 초과.
      - alert: HighServerErrorRate
        expr: >
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 5xx 비율 5% 초과 (최근 5분)"
          description: "control-plane/actuator 응답의 5xx 비율이 SLO(5%)를 넘었습니다."

      # 지연 SLO: HTTP p99 가 500ms 를 5분 이상 초과.
      - alert: HighRequestLatencyP99
        expr: >
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p99 지연 500ms 초과 (최근 5분)"

      # DB 풀 포화: 커넥션을 기다리는 스레드가 5분 이상 존재.
      - alert: DbConnectionPoolPending
        expr: hikaricp_connections_pending > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB 커넥션 풀 대기 발생 (최근 5분)"

      # 도메인 신호: 리소스 차단이 급증(5분 내 분당 10건 초과).
      - alert: ResourceBlocklistSurge
        expr: sum(rate(reputation_resource_blocklisted_total[5m])) * 60 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "리소스 차단 급증 (분당 10건 초과, 최근 5분)"

      # gRPC 데이터플레인 지연 SLO (#78): Acquire/Report(실제 서빙 경로) p99 가 500ms 를 5분 이상 초과.
      # net.devh의 GrpcServerMetricAutoConfiguration 이 이미 모든 RPC를 grpc_server_processing_duration_seconds
      # 로 계측하고 있고, application.yml 의 percentiles-histogram 설정으로 _bucket 시계열이 노출된다.
      - alert: GrpcLatencyP99
        expr: >
          histogram_quantile(0.99, sum(rate(grpc_server_processing_duration_seconds_bucket{method=~"Acquire|Report"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "gRPC(Acquire/Report) p99 지연 500ms 초과 (최근 5분)"

      # gRPC 에러율 SLO (#78): statusCode 가 OK 가 아닌 비율이 5% 를 5분 이상 초과.
      - alert: GrpcHighErrorRate
        expr: >
          sum(rate(grpc_server_processing_duration_seconds_count{statusCode!="OK"}[5m]))
          / sum(rate(grpc_server_processing_duration_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "gRPC 에러율 5% 초과 (최근 5분)"
