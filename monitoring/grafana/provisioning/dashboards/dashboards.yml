# Grafana 대시보드 프로비저닝 (#14). 아래 경로의 JSON 을 자동 로드한다.
apiVersion: 1
providers:
  - name: reputation-pool
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
