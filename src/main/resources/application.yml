spring:
  application:
    name: reputation-pool-cloud
  autoconfigure:
    # Spring Security's default in-memory user (with a generated password logged at startup) is
    # meaningless here: the control plane authenticates with a JWT (oauth2 resource server), and gRPC
    # uses its own x-api-key interceptor. Excluding it removes an unused account and a confusing log line.
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${REPUTATION_POOL_DB_URL:jdbc:postgresql://localhost:5435/reputation_pool}
    username: ${REPUTATION_POOL_DB_USERNAME:reputation_pool}
    # No baked-in default: the password must be supplied via REPUTATION_POOL_DB_PASSWORD (empty here
    # so a missing value fails to connect rather than silently using a known password). Local dev sets
    # it to the compose.yaml value; production supplies it from a secret.
    password: ${REPUTATION_POOL_DB_PASSWORD:}
  flyway:
    enabled: true
    # locations default to classpath:db/migration — the reputation-pool-persistence jar ships
    # V1__snapshot.sql and V2__audit.sql there, so the schema is migrated before the store is used.

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8083}
  # Caddy(#15) 뒤에서 X-Forwarded-For / X-Forwarded-* 헤더의 실제 클라이언트 IP를 request.getRemoteAddr()에
  # 반영한다 — 로그인 브루트포스 방어(#28)가 프록시 뒤에서도 진짜 클라이언트 IP로 스로틀하기 위함. 신뢰 경계는
  # 네트워크다: 8083은 Caddy만 접근 가능해야 하며 앱을 외부에 직접 노출하지 말 것. 그렇지 않으면 클라이언트가
  # X-Forwarded-For를 위조해 스로틀을 우회하거나 다른 IP를 덮어씌울 수 있다.
  forward-headers-strategy: framework

grpc:
  server:
    port: ${GRPC_PORT:9093}

# Engine wiring knobs. Defaults mirror the public reputation-pool AdvisorServer composition root.
reputation-pool:
  auth:
    # Single API key seeded for the default tenant on startup (issue #9a). No baked default: unset →
    # nothing is seeded, so the api_key table stays empty and the interceptor rejects all gRPC calls
    # (fail closed). Supply via REPUTATION_POOL_API_KEY; #11 replaces this with per-tenant key mgmt.
    api-key: ${REPUTATION_POOL_API_KEY:}
  # REST control-plane admin login (issue #11). All three secrets come from env / a secret manager;
  # no baked defaults. When any is unset the admin console is disabled (fail closed): login cannot mint
  # a token and every /api/** call is rejected — the gRPC data plane is unaffected. The jwt-secret must
  # be at least 32 bytes (HS256 needs a 256-bit key); a shorter value fails fast at startup. v1 is a
  # single admin login bound to `tenant`, which scopes the dashboard read model (no RBAC yet).
  admin:
    username: ${REPUTATION_POOL_ADMIN_USERNAME:}
    password: ${REPUTATION_POOL_ADMIN_PASSWORD:}
    tenant: ${REPUTATION_POOL_ADMIN_TENANT:default}
    jwt-secret: ${REPUTATION_POOL_ADMIN_JWT_SECRET:}
    token-ttl: ${REPUTATION_POOL_ADMIN_TOKEN_TTL:PT1H}
    # 로그인 브루트포스 방어(#28). POST /api/auth/login을 소스 IP 기준으로 스로틀한다. v1은 단일 admin
    # 계정이라 "계정 잠금"은 self-DoS이므로, 계정이 아니라 IP를 일시 차단한다. L1: window 안에서 max-attempts
    # 실패 시 그 IP를 block-duration 동안 차단(429 + Retry-After), 로그인 성공 시 해당 IP 카운터 리셋.
    # L2: global-max-per-second는 여러 IP 분산 시도에 대한 전역 초당 상한 안전판.
    login-throttle:
      enabled: ${REPUTATION_POOL_ADMIN_LOGIN_THROTTLE_ENABLED:true}
      max-attempts: 5
      window: PT15M
      block-duration: PT15M
      global-max-per-second: 20
  lease-ttl: PT30S
  checkpoint-interval: PT30S
  engine:
    window-size: 10
    cool-after: 2
    recover-after: 2
  audit:
    purge-interval: PT1H
    # Opt-in audit retention (ISO-8601, e.g. P30D). P0D (the default) means never purge — the trail
    # grows unbounded, exactly as the reference does when the knob is unset.
    retention: ${REPUTATION_POOL_AUDIT_RETENTION:P0D}
