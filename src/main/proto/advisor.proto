syntax = "proto3";

package io.github.preagile.reputationpool.grpc.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Wire types are nested under one outer class (java_multiple_files = false) on purpose: their simple
// names (ResourceId, Context, Outcome, PoolEvent, ...) collide with the core domain types, so the
// AdvisorProto. prefix keeps "wire DTO" and "domain value" unambiguous in the mapping layer.
option java_package = "io.github.preagile.reputationpool.grpc.v1";
option java_outer_classname = "AdvisorProto";

// ---------- domain DTOs (mirror io.github.preagile.reputationpool.core.domain) ----------

// The 0 value is the proto3-required "unset" sentinel; the domain enum has no such member, so the
// mapping rejects UNSPECIFIED on the way in rather than inventing a domain value for it.
enum ResourceKind {
  RESOURCE_KIND_UNSPECIFIED = 0;
  PROXY = 1;
  ACCOUNT = 2;
  SESSION = 3;
}

enum FailureType {
  FAILURE_TYPE_UNSPECIFIED = 0;
  CONNECTION_RESET = 1;
  TLS_HANDSHAKE = 2;
  TIMEOUT = 3;
  BLOCKED = 4;
  SLOW = 5;
}

message ResourceId {
  ResourceKind kind = 1;
  string value = 2;
}

message Context {
  string value = 1;
}

message Outcome {
  oneof kind {
    Success success = 1;
    Failure failure = 2;
  }

  message Success {
    google.protobuf.Duration latency = 1;
  }

  message Failure {
    FailureType type = 1;
    google.protobuf.Duration latency = 2;
  }
}

// The caller echoes this back to renew/release; token is the fencing token from the core's Lease.
message LeaseHandle {
  ResourceId resource = 1;
  Context context = 2;
  int64 token = 3;
  google.protobuf.Timestamp leased_at = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message PoolEvent {
  google.protobuf.Timestamp at = 1;

  oneof event {
    ResourceCooled cooled = 2;
    ResourceRecovered recovered = 3;
    ResourceBlocklisted blocklisted = 4;
    ResourceUnblocked unblocked = 5;
    ResourceLeased leased = 6;
    LeaseReleased lease_released = 7;
  }

  message ResourceCooled {
    ResourceId resource = 1;
    Context context = 2;
    google.protobuf.Timestamp until = 3;
    FailureType cause = 4;
  }

  message ResourceRecovered {
    ResourceId resource = 1;
    Context context = 2;
  }

  message ResourceBlocklisted {
    ResourceId resource = 1;
    // A block either expires at a concrete time or never does. Permanence is wire-visible
    // structure rather than an out-of-range timestamp sentinel (the core's Instant.MAX does
    // not fit google.protobuf.Timestamp's 0001..9999 range).
    oneof until {
      google.protobuf.Timestamp expires_at = 2;
      bool permanent = 3;
    }
  }

  message ResourceUnblocked {
    ResourceId resource = 1;
  }

  message ResourceLeased {
    ResourceId resource = 1;
    Context context = 2;
    google.protobuf.Timestamp until = 3;
  }

  message LeaseReleased {
    ResourceId resource = 1;
    Context context = 2;
  }
}

// ---------- service (implemented in a later phase; declared now to lock the contract) ----------

service ReputationAdvisor {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Acquire(AcquireRequest) returns (AcquireResponse);
  rpc Report(ReportRequest) returns (ReportResponse);
  rpc Renew(RenewRequest) returns (RenewResponse);
  rpc Release(ReleaseRequest) returns (ReleaseResponse);
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream PoolEvent);
}

message RegisterRequest {
  ResourceId resource = 1;
}
message RegisterResponse {}

message AcquireRequest {
  Context context = 1;
}
message AcquireResponse {
  bool granted = 1;
  LeaseHandle lease = 2; // present iff granted
}

message ReportRequest {
  ResourceId resource = 1;
  Context context = 2;
  Outcome outcome = 3;
}
message ReportResponse {}

message RenewRequest {
  LeaseHandle lease = 1;
}
message RenewResponse {
  bool renewed = 1;
  LeaseHandle lease = 2; // the extended lease, present iff renewed
}

message ReleaseRequest {
  LeaseHandle lease = 1;
}
message ReleaseResponse {
  bool released = 1;
}

message SubscribeEventsRequest {}
