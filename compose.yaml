# The deployment unit for reputation-pool-cloud (issue #5): the app + PostgreSQL together. Flyway (in
# the app) migrates the persistence jar's V1/V2 schema on startup.
#
#   cp .env.example .env              # one-time: provides REPUTATION_POOL_API_KEY (required)
#   docker compose up --build -d      # start app + db
#   grpcurl -H "x-api-key: $KEY" -plaintext localhost:9093 list   # engine reachable over gRPC
#
# Production injects REPUTATION_POOL_API_KEY (and optionally REPUTATION_POOL_DB_PASSWORD) from a secret
# store; there is no committed default for the API key on purpose.
#
# The app connects to the db over the compose network (db:5432). Host ports are published for local
# convenience but the app's HTTP port (8083) and gRPC port (9093) are bound to loopback (127.0.0.1)
# only — browsers reach the stack through Caddy (:8080), never the app directly.
#
# XFF trust boundary (issue #28): server.forward-headers-strategy=framework trusts X-Forwarded-For, so
# the login throttle keys its per-IP limit on that header. That is only safe while 8083 is NOT directly
# reachable from outside — a direct client could forge X-Forwarded-For to dodge or frame another IP.
# Hence the loopback binding below; do not republish 8083 (or 9093) on 0.0.0.0. See
# docs/engineering/security.md.
services:
  db:
    image: postgres:17
    container_name: reputation-pool-db
    environment:
      POSTGRES_DB: reputation_pool
      POSTGRES_USER: reputation_pool
      # Interpolated from the host env so a real secret can be injected; falls back to a local-dev
      # throwaway when unset. app and db share the one variable so they always agree.
      POSTGRES_PASSWORD: ${REPUTATION_POOL_DB_PASSWORD:-reputation_pool}
    ports:
      - "5435:5432"
    volumes:
      - reputation-pool-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reputation_pool -d reputation_pool"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: reputation-pool-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Connects over the compose network. The password is interpolated from the host env — set
      # REPUTATION_POOL_DB_PASSWORD (from a secret) to inject it in production; unset falls back to the
      # local-dev throwaway. A literal value here would shadow the host env and break secret injection.
      REPUTATION_POOL_DB_URL: jdbc:postgresql://db:5432/reputation_pool
      REPUTATION_POOL_DB_USERNAME: reputation_pool
      REPUTATION_POOL_DB_PASSWORD: ${REPUTATION_POOL_DB_PASSWORD:-reputation_pool}
      # gRPC API key — REQUIRED, no default. A fallback would put a known key on the public API
      # (auth bypass), so compose fails if it is unset: copy .env.example to .env for local dev, or
      # inject the secret in production. Clients send it in the x-api-key metadata header.
      REPUTATION_POOL_API_KEY: ${REPUTATION_POOL_API_KEY:?set REPUTATION_POOL_API_KEY (copy .env.example to .env for local dev)}
      # REST control-plane admin login (issue #11). Optional: unset leaves the admin console disabled
      # (fail closed — /api/** rejects everything), so the gRPC data plane above works without them. Set
      # all three to use the console; JWT_SECRET must be at least 32 bytes (HS256 needs a 256-bit key).
      REPUTATION_POOL_ADMIN_USERNAME: ${REPUTATION_POOL_ADMIN_USERNAME:-}
      REPUTATION_POOL_ADMIN_PASSWORD: ${REPUTATION_POOL_ADMIN_PASSWORD:-}
      REPUTATION_POOL_ADMIN_JWT_SECRET: ${REPUTATION_POOL_ADMIN_JWT_SECRET:-}
    ports:
      # Loopback-only: reachable from the host for local dev, but not exposed to the network. This is the
      # premise of the login throttle's X-Forwarded-For trust — see the header comment and #28.
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Give the JVM + Flyway room to come up before health failures count against the container.
      start_period: 40s
    restart: unless-stopped

  # 대시보드(#12) — Next.js standalone. 호스트에 포트를 열지 않고 Caddy를 통해서만 노출된다.
  # BACKEND_ORIGIN은 standalone 서버의 /api·/actuator rewrite가 쓰는 백엔드 주소(compose 네트워크).
  dashboard:
    build:
      context: ./dashboard
    container_name: reputation-pool-dashboard
    depends_on:
      app:
        condition: service_healthy
    environment:
      BACKEND_ORIGIN: http://app:8083
    restart: unless-stopped

  # 한 오리진 서빙(#15 / D8): /api·/actuator → app, 나머지 → dashboard. 브라우저는 여기(8080)만 본다.
  caddy:
    image: caddy:2
    container_name: reputation-pool-caddy
    depends_on:
      - app
      - dashboard
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    restart: unless-stopped

  # 모니터링(#14 / D7b). app 의 /actuator/prometheus 를 스크레이프해 시계열로 쌓고 Grafana 로 본다.
  # 둘 다 compose 네트워크 내부에서만 동작: Prometheus 는 호스트 포트를 안 열고 app:8083 을 직접 긁으며
  # (이 엔드포인트는 permitAll 이지만 Caddy 로는 외부 차단 — 신뢰 경계=네트워크), Grafana 만 로컬 확인용
  # 으로 loopback 3001 에 노출한다. 프로덕션 노출/인증은 #15 후속(Caddy 뒤 or 별도 통제).
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: reputation-pool-prometheus
    depends_on:
      app:
        condition: service_healthy
      alertmanager:
        condition: service_started
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - reputation-pool-prometheus-data:/prometheus
    restart: unless-stopped

  # 알림 라우팅(#76). alerts.yml 의 SLO 룰이 firing 되면 Prometheus 가 여기로 넘겨(prometheus.yml 의
  # alerting.alertmanagers) grouping/dedup/silence/정비창을 맡는다. 호스트 포트를 열지 않는 compose
  # 네트워크 전용 서비스 — Prometheus/Grafana 와 같은 posture. 기본은 monitoring/alertmanager.yml 의
  # receiver 가 무통합(zero integrations) blackhole 이라 시크릿 없이도 뜬다. 실제 webhook 을 붙이려면
  # REPUTATION_POOL_ALERTMANAGER_WEBHOOK_URL 을 설정하고 monitoring/alertmanager.yml 의 webhook_configs
  # 주석을 해제한다 — url_file 이 아래 secrets 로 마운트된 파일을 가리키므로 URL 자체는 설정 파일에
  # 담기지 않는다(monitoring/README.md "알림 라우팅" 참고).
  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: reputation-pool-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - reputation-pool-alertmanager-data:/alertmanager
    secrets:
      - alertmanager_webhook_url
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: reputation-pool-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # fail-closed: 알려진 admin/admin 을 두지 않는다 — 비밀번호는 필수다. 미설정 시 compose 가 즉시
      # 실패한다(REPUTATION_POOL_API_KEY 와 동일 규약). 로컬은 .env(.env.example 복사), 프로덕션은 시크릿.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD (copy .env.example for local dev)}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      # loopback 만: 로컬에서 대시보드 확인용. 외부 노출은 #15 후속.
      - "127.0.0.1:3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - reputation-pool-grafana-data:/var/lib/grafana
    restart: unless-stopped

  # 일일 DB 백업(#15). db 를 pg_dump(-Fc)로 덤프해 backups 볼륨에 남기고 보존 기간 경과분을 지운다.
  # postgres:17 이미지의 pg_dump/pg_restore 를 그대로 써 추가 의존이 없다. 하루 한 번 실행 후 대기하며,
  # 복원은 scripts/restore.sh, 복원 가능성은 RestoreRehearsalIT 가 자동 검증한다(#15 종료 기준).
  backup:
    image: postgres:17
    container_name: reputation-pool-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      # db 컨테이너와 같은 비밀번호. app/db 와 동일 변수로 항상 일치.
      PGPASSWORD: ${REPUTATION_POOL_DB_PASSWORD:-reputation_pool}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    # 성공 시 24h 대기, 실패 시 1h 뒤 재시도 — 일시적 장애로 하루치 백업을 통째로 잃지 않도록.
    entrypoint: ["/bin/sh", "-c", "while true; do if /usr/local/bin/backup.sh; then sleep 86400; else echo 'backup failed (1시간 후 재시도)'; sleep 3600; fi; done"]
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/restore.sh:/usr/local/bin/restore.sh:ro
      - reputation-pool-backups:/backups
    restart: unless-stopped

volumes:
  reputation-pool-db-data:
  caddy-data:
  reputation-pool-prometheus-data:
  reputation-pool-grafana-data:
  reputation-pool-alertmanager-data:
  reputation-pool-backups:

# Compose Spec 의 secrets(environment 소스, #76): 커스텀 entrypoint/envsubst 렌더링 없이 호스트 환경
# 변수 값을 파일로 자동 마운트한다(/run/secrets/<name>). REPUTATION_POOL_ALERTMANAGER_WEBHOOK_URL 이
# 비어 있으면(로컬 기본) 빈 파일이 마운트될 뿐이라 시크릿 없이도 docker compose up 이 성공한다.
secrets:
  alertmanager_webhook_url:
    environment: REPUTATION_POOL_ALERTMANAGER_WEBHOOK_URL
