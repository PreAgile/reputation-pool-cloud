# The deployment unit for reputation-pool-cloud (issue #5): the app + PostgreSQL together. Flyway (in
# the app) migrates the persistence jar's V1/V2 schema on startup.
#
#   docker compose up --build -d      # build the image and start app + db
#   grpcurl -plaintext localhost:9093 list   # once healthy, the engine is reachable over gRPC
#
# The app connects to the db over the compose network (db:5432); host ports 8083 (HTTP), 9093 (gRPC),
# and 5435 (Postgres, for local psql) are published for convenience.
services:
  db:
    image: postgres:17
    container_name: reputation-pool-db
    environment:
      POSTGRES_DB: reputation_pool
      POSTGRES_USER: reputation_pool
      # Local-dev throwaway credential only — production supplies REPUTATION_POOL_DB_PASSWORD via env.
      POSTGRES_PASSWORD: reputation_pool
    ports:
      - "5435:5432"
    volumes:
      - reputation-pool-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reputation_pool -d reputation_pool"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: reputation-pool-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Connects over the compose network. The password is the local-dev throwaway above; production
      # injects REPUTATION_POOL_DB_PASSWORD from a secret (application.yml has no default).
      REPUTATION_POOL_DB_URL: jdbc:postgresql://db:5432/reputation_pool
      REPUTATION_POOL_DB_USERNAME: reputation_pool
      REPUTATION_POOL_DB_PASSWORD: reputation_pool
    ports:
      - "8083:8083"
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Give the JVM + Flyway room to come up before health failures count against the container.
      start_period: 40s
    restart: unless-stopped

volumes:
  reputation-pool-db-data:
