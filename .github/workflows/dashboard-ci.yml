# 대시보드(#12/#44) 프론트 CI — dashboard/ 변경 시에만 도는 별도 워크플로.
# 백엔드(Gradle) "Build & Test"(ci.yml)와 독립이다: 여기서는 Node/pnpm 프론트만 다룬다.
#
# 잡 구성:
#   - gate  : 서비스 불필요한 빠른 필수 게이트(typecheck·lint·vitest·build). PR 머지 게이트로 사용.
#   - e2e   : docker compose 전체 스택(db+app+dashboard+caddy)을 띄우고 Playwright e2e 실행.
#             서비스 기동이 무거워 continue-on-error(후속/안정화 대상) — 필수 게이트 아님.
#
# visual 스냅샷 잡은 일부러 넣지 않았다: 베이스라인이 macOS(darwin)에서 생성돼 Linux 러너/컨테이너
# 렌더와 픽셀이 달라 반드시 실패한다. Linux 베이스라인(컨테이너 렌더) 재생성은 후속 과제로 남긴다.
name: Dashboard CI

on:
  push:
    branches: [ main ]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"

# 같은 ref에 새 push가 오면 진행 중 실행을 취소한다.
concurrency:
  group: dashboard-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: dashboard

jobs:
  # 필수 게이트: 서비스 없이 도는 정적/단위 검증. 이 잡이 그린이어야 머지한다.
  gate:
    name: Typecheck / Lint / Vitest / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # pnpm은 packageManager 필드(pnpm@11)에 고정 — corepack이 그 버전을 준비한다.
      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: corepack pnpm typecheck

      - name: Lint (next lint)
        run: corepack pnpm lint

      - name: Unit tests (vitest)
        run: corepack pnpm test

      - name: Build (next build)
        run: corepack pnpm build

  # 후속/선택: 전체 스택을 띄워 실브라우저 e2e를 돈다. 서비스 기동이 무거워 필수 게이트가 아니며,
  # 예산 복구 후 안정화 대상이다. 실패해도 워크플로 전체를 빨갛게 만들지 않는다.
  e2e:
    name: Playwright e2e (compose stack)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      # e2e 프로젝트만 쓰는 Chromium과 OS 의존 라이브러리를 설치한다.
      - name: Install Playwright browser (chromium)
        run: corepack pnpm exec playwright install --with-deps chromium

      # 전체 스택 기동. e2e 로그인 스펙이 admin/admin1234를 쓰므로 관리자 콘솔을 켠다.
      # API 키는 compose가 필수로 요구(미설정 시 즉시 실패), JWT 시크릿은 32바이트 이상이어야 한다.
      - name: Start stack (docker compose)
        working-directory: .
        env:
          REPUTATION_POOL_API_KEY: ci-local-dev-key
          REPUTATION_POOL_ADMIN_USERNAME: admin
          REPUTATION_POOL_ADMIN_PASSWORD: admin1234
          REPUTATION_POOL_ADMIN_JWT_SECRET: ci0123456789abcdef0123456789abcdef
          # Grafana(#14) 관리자 비번은 compose 필수값 — CI 스택 기동용 throwaway.
          GRAFANA_ADMIN_PASSWORD: ci-local-dev-admin
        run: docker compose up -d --build

      # Caddy 한 오리진(:8080)이 대시보드를 서빙할 때까지 대기(최대 ~2분).
      - name: Wait for dashboard (Caddy origin :8080)
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
              echo "dashboard is up"; exit 0
            fi
            echo "waiting for dashboard... ($i)"; sleep 2
          done
          echo "dashboard did not become ready in time"
          docker compose logs --no-color
          exit 1

      - name: Run e2e (Playwright, Caddy origin)
        env:
          E2E_BASE_URL: http://localhost:8080
        run: corepack pnpm test:e2e

      - name: Dump compose logs on failure
        if: failure()
        working-directory: .
        run: docker compose logs --no-color

      # cleanup 은 항상 실행(always)하되, down -v 의 non-zero exit(볼륨/네트워크 제거 race 등)가
      # e2e 통과한 job 을 fail 로 만들지 않도록 continue-on-error 로 결과 전파를 끊는다.
      - name: Tear down stack
        if: always()
        continue-on-error: true
        working-directory: .
        run: docker compose down -v
